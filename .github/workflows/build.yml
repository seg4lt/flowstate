name: Build

on:
  push:
    tags:
      - 'v*'

# Releases publish to this repo (github.repository). No cross-repo
# auth needed — default GITHUB_TOKEN is enough because softprops/
# action-gh-release defaults `repository` to the current repo.

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            runner: macos-14
            target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
            bundle-subpath: aarch64-apple-darwin/release/bundle
            # Default cargo behavior on darwin (no static CRT — that's
            # a Windows-MSVC concept). Empty string preserves whatever
            # toolchain default would apply.
            rustflags: ""

          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            tauri-args: ""
            bundle-subpath: release/bundle
            # Static MSVC C/C++ runtime — see the Build step's
            # RUSTFLAGS comment for the full rationale (no
            # `vcruntime140.dll`, `msvcp140.dll`, or UCRT shim
            # dependency on the user's machine).
            rustflags: "-C target-feature=+crt-static"

          # - name: linux-x64
          #   runner: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   tauri-args: ""
          #   bundle-subpath: release/bundle

    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/flowstate/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          # Unified workspace at repo root — target/ lives at root now.
          workspaces: . -> target

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # - name: Install Linux deps
      #   if: runner.os == 'Linux'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       libwebkit2gtk-4.1-dev \
      #       libappindicator3-dev \
      #       librsvg2-dev \
      #       patchelf

      - name: Install frontend dependencies
        working-directory: apps/flowstate
        run: pnpm install --frozen-lockfile

      # `flow` CLI — small Rust binary the desktop app's Settings
      # page installs onto the user's PATH. We compile it for the
      # same target triple as the app so Settings → Command line →
      # Install can resolve a sibling binary via
      # current_exe().parent().join("flow").
      #
      # Built BEFORE `pnpm tauri build` because on Windows we stage
      # it as a Tauri externalBin sidecar (see the next step +
      # tauri.windows.conf.json) which the bundler reads during its
      # own build. macOS uses a post-build copy (Bundle flow CLI
      # into app step further down) so the ordering doesn't matter
      # there — building first is just simpler than splitting the
      # step by OS.
      - name: Build flow CLI
        shell: bash
        env:
          # Same static-CRT treatment as the main app build below —
          # otherwise on Windows `flow.exe` would dynamically link
          # `vcruntime140.dll` / `msvcp140.dll` while `flowstate.exe`
          # statically links them, producing an inconsistent bundle
          # where the sidecar fails to launch on a fresh Windows
          # install. Empty / unset on non-Windows.
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} -p flow

      # Stage flow.exe as a Tauri externalBin sidecar so the NSIS /
      # MSI bundlers place it next to flowstate.exe in the install
      # dir. Tauri expects the source file to be named with the
      # target triple appended (and `.exe` on Windows); after
      # bundling the suffix is stripped, leaving plain `flow.exe`
      # which install_cli.rs's current_exe()-based lookup picks up.
      # tauri.windows.conf.json declares the sidecar entry.
      - name: Stage flow CLI as Tauri sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/flowstate/src-tauri/binaries
          cp "target/${{ matrix.target }}/release/flow.exe" \
             "apps/flowstate/src-tauri/binaries/flow-${{ matrix.target }}.exe"

      - name: Build
        working-directory: apps/flowstate
        env:
          # Minisign key used by the Tauri updater. Built bundles are
          # signed with this; the matching pubkey is embedded in
          # src-tauri/tauri.conf.json (`plugins.updater.pubkey`) and
          # the desktop plugin verifies every manifest against it
          # before downloading. `createUpdaterArtifacts: true` in
          # tauri.conf.json makes this a hard build requirement —
          # if the secret is missing, `pnpm tauri build` fails here.
          # The key was generated with `tauri signer generate --ci`
          # (no password), so the PASSWORD env var can stay empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Embed the WebView2 loader directly into flowstate.exe
          # instead of dynamically linking `WebView2Loader.dll`.
          # webview2-com-sys's link declaration is gated to
          # `target_env = "msvc"` for the static branch — on the
          # windows-x64 matrix row this flips Cargo's link line from
          # `link(name = "WebView2Loader.dll")` to
          # `link(name = "WebView2LoaderStatic", kind = "static")`.
          # Net effect: the shipped exe is self-contained and won't
          # error with "WebView2Loader.dll was not found" if a user
          # extracts just the binary from the install dir. macOS /
          # Linux rows compile webview2-com-sys out entirely (it's
          # `cfg(target_os = "windows")`), so this env var is a
          # harmless no-op on non-Windows runners.
          WEBVIEW2_STATIC: "1"
          # Statically link the MSVC C/C++ runtime on Windows so
          # `flowstate.exe` does not depend on `vcruntime140.dll`,
          # `msvcp140.dll`, or any of the `api-ms-win-crt-*` /
          # `ucrtbase.dll` UCRT shims at load time. By default, Rust's
          # x86_64-pc-windows-msvc target dynamic-links the CRT, which
          # works on machines that already have the Visual C++
          # Redistributable installed (typically pre-installed on
          # modern Windows via Windows Update or a previously-installed
          # MSVC-linked app) but breaks with `The code execution cannot
          # proceed because vcruntime140.dll was not found` on a fresh
          # / older Windows install. `+crt-static` flips Rust's link
          # line to use `libcmt.lib` instead of `msvcrt.lib`, embedding
          # the runtime into the binary — slightly larger exe, no
          # external CRT dependency. Empty / unset on non-Windows
          # runners (matrix.rustflags below); RUSTFLAGS replaces (not
          # appends to) any default, so leaving it unset preserves
          # cargo's default behavior elsewhere.
          RUSTFLAGS: ${{ matrix.rustflags }}
        # `env -u CI`: fff-search 0.5.2's build.rs hard-panics
        # whenever the `CI` env var is set (gate is
        # `env::var("CI").is_ok()`, so "false" / "" all trip it)
        # unless the zig-backed `zlob` SIMD feature is enabled. We
        # deliberately don't enable zlob to avoid forcing a zig
        # install on every release-matrix platform (macOS / Windows
        # / Linux each need a different package manager). Stripping
        # CI from the process tree for this step picks the same
        # pure-Rust grep path local dev uses. See
        # apps/flowstate/src-tauri/Cargo.toml for the full rationale
        # inline on the fff-search dep.
        #
        # `shell: bash` is required for `env -u` — the default pwsh
        # on Windows runners doesn't recognise it. Git Bash ships on
        # every GitHub runner image so this works once the Windows /
        # Linux matrix rows are reinstated.
        shell: bash
        run: env -u CI pnpm tauri build ${{ matrix.tauri-args }}

      - name: Bundle flow CLI into app (macOS)
        if: runner.os == 'macOS'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH=$(find . -name "flowstate.app" -path "*/release/bundle/macos/*" | head -1)
          FLOW_BIN="target/${{ matrix.target }}/release/flow"
          if [ ! -x "$FLOW_BIN" ]; then
            echo "flow binary missing at $FLOW_BIN — Build flow CLI step failed?" >&2
            exit 1
          fi
          cp "$FLOW_BIN" "$APP_PATH/Contents/MacOS/flow"
          chmod +x "$APP_PATH/Contents/MacOS/flow"
          # Codesign so Gatekeeper doesn't kill the binary on launch
          # — ad-hoc is fine since it's invoked only by the user's
          # own shell, not over the network. The app itself is
          # signed by the Tauri bundler upstream of this step.
          codesign --force --sign - "$APP_PATH/Contents/MacOS/flow"

          # Regenerate the updater artifacts so future auto-updates
          # preserve the bundled flow binary. The Tauri bundler
          # produced `<name>.app.tar.gz` + matching `.sig` BEFORE we
          # added flow to the .app, so without this step every
          # update would silently strip the CLI. We re-tar the
          # modified .app and re-sign with the same minisign key.
          #
          # Path note: `pnpm --dir apps/flowstate exec` changes the
          # signer's cwd to apps/flowstate, but `target/` lives at
          # the repo root. Pass the tarball as an absolute path so
          # the signer can find it regardless of cwd.
          MACOS_DIR_ABS="$(cd "$(dirname "$APP_PATH")" && pwd)"
          APP_NAME=$(basename "$APP_PATH")
          TAR_PATH="${MACOS_DIR_ABS}/${APP_NAME}.tar.gz"
          (
            cd "$MACOS_DIR_ABS"
            tar -czf "${APP_NAME}.tar.gz" "$APP_NAME"
            # Older `.sig` is now stale — overwrite via the Tauri
            # signer. `--password ""` is required by the CLI even
            # when the key has no password.
            rm -f "${APP_NAME}.tar.gz.sig"
          )
          pnpm --dir apps/flowstate exec tauri signer sign \
            --private-key "${TAURI_SIGNING_PRIVATE_KEY}" \
            --password "" \
            "$TAR_PATH"

      # No Windows post-build flow step — the externalBin sidecar
      # declared in tauri.windows.conf.json (staged by "Stage flow
      # CLI as Tauri sidecar (Windows)" before the Tauri build)
      # makes the NSIS / MSI bundlers place flow.exe next to
      # flowstate.exe natively, so install_cli.rs finds it via
      # current_exe().parent() with no extra work here.

      - name: Repackage DMG with install script (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH=$(find . -name "flowstate.app" -path "*/release/bundle/macos/*" | head -1)
          DMG_DIR=$(dirname "$APP_PATH" | sed 's|/macos$|/dmg|')
          OLD_DMG=$(find . -name "*.dmg" -path "*/release/bundle/dmg/*" | head -1)

          rm -f "$OLD_DMG"

          STAGING=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING/"
          cp apps/flowstate/scripts/install-macos.command "$STAGING/Install Flowstate.command"
          chmod +x "$STAGING/Install Flowstate.command"

          hdiutil create \
            -volname "Flowstate" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_DIR/Flowstate.dmg"

          rm -rf "$STAGING"

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          TAG="${{ github.ref_name }}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            DMG=$(find . -name "Flowstate.dmg" -path "*/release/bundle/dmg/*" | head -1)
            cp "$DMG" "release-assets/Flowstate-${TAG}-macos-arm64.dmg"

            # Updater artifacts. createUpdaterArtifacts in tauri.conf.json
            # makes the bundler drop an .app.tar.gz (the delta the
            # updater swaps in on macOS) and a .app.tar.gz.sig
            # (minisign signature over it) next to the .app in
            # bundle/macos/. Both get uploaded; the release job reads
            # the .sig contents to populate latest.json.
            APP_TAR=$(find . -name "*.app.tar.gz" -path "*/release/bundle/macos/*" | head -1)
            APP_SIG=$(find . -name "*.app.tar.gz.sig" -path "*/release/bundle/macos/*" | head -1)
            cp "$APP_TAR" "release-assets/Flowstate-${TAG}-macos-arm64.app.tar.gz"
            cp "$APP_SIG" "release-assets/Flowstate-${TAG}-macos-arm64.app.tar.gz.sig"
          fi

          if [ "${{ runner.os }}" = "Windows" ]; then
            MSI=$(find . -name "*.msi" -path "*/release/bundle/msi/*" | head -1)
            EXE=$(find . -name "*-setup.exe" -path "*/release/bundle/nsis/*" | head -1)
            cp "$MSI" "release-assets/Flowstate-${TAG}-windows-x64.msi"
            cp "$EXE" "release-assets/Flowstate-${TAG}-windows-x64-setup.exe"

            # Updater artifacts. On Windows the NSIS setup.exe itself
            # is what the updater runs; tauri emits `<name>-setup.exe.sig`
            # and `<name>.msi.sig` alongside the installers in the
            # respective bundle dirs. We ship the NSIS sig because
            # `latest.json` below points at the NSIS URL — MSI is
            # kept as a standard-installer download only.
            EXE_SIG=$(find . -name "*-setup.exe.sig" -path "*/release/bundle/nsis/*" | head -1)
            cp "$EXE_SIG" "release-assets/Flowstate-${TAG}-windows-x64-setup.exe.sig"
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.name }}
          path: release-assets/
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      # Required so the default GITHUB_TOKEN can create releases.
      contents: write

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: ls -la release-assets/

      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          # Publish to this repo — matches tauri.conf.json updater endpoint.
          REPO="${{ github.repository }}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # The Tauri updater fetches latest.json from the release,
          # matches its current platform against the `platforms` map,
          # verifies the `signature` field against the embedded
          # pubkey, and then downloads `url`. URLs must be the final
          # GitHub release download URLs (which don't exist until
          # the release is published), but GitHub's /releases/download/
          # scheme is deterministic from tag + filename, so we can
          # precompute them here.
          MAC_SIG="$(cat "release-assets/Flowstate-${TAG}-macos-arm64.app.tar.gz.sig")"
          WIN_SIG="$(cat "release-assets/Flowstate-${TAG}-windows-x64-setup.exe.sig")"

          cat > release-assets/latest.json <<EOF
          {
            "version": "${TAG}",
            "notes": "See the release page for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Flowstate-${TAG}-macos-arm64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Flowstate-${TAG}-windows-x64-setup.exe"
              }
            }
          }
          EOF

          echo "--- latest.json ---"
          cat release-assets/latest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # No `repository:` override — defaults to github.repository
          # (this repo). No `token:` override — default GITHUB_TOKEN
          # has `contents: write` from the permissions block above.
          tag_name: ${{ github.ref_name }}
          name: Flowstate ${{ github.ref_name }}
          body: |
            ## Flowstate ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Flowstate-${{ github.ref_name }}-macos-arm64.dmg` |
            | Windows (x64) MSI | `Flowstate-${{ github.ref_name }}-windows-x64.msi` |
            | Windows (x64) Setup | `Flowstate-${{ github.ref_name }}-windows-x64-setup.exe` |

            ### Quick install (any platform)
            ```
            npx @seg4lt/flowstate                              # latest
            npx @seg4lt/flowstate install --version ${{ github.ref_name }}   # pin to this release
            ```
            Downloads the right artifact for your OS, installs, and
            launches the app. Bypasses Gatekeeper on macOS without you
            having to mount the DMG.

            ### macOS Installation (manual)
            1. Download the `.dmg` file
            2. Open it and double-click "Install Flowstate.command"
            3. This installs to /Applications and clears the quarantine flag

            ### Windows Installation (manual)
            Download either the `.msi` (standard Windows Installer) or the `-setup.exe` (NSIS installer).

            ### Auto-updates
            Existing installs will see this version via the in-app
            updater (Settings → Updates, or the startup check). The
            `.app.tar.gz` / `-setup.exe.sig` / `latest.json` assets
            are consumed by the updater — you don't need to touch
            them manually.
          draft: false
          prerelease: false
          files: release-assets/*
