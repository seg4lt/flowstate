name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            runner: macos-14
            target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
            bundle-path: src-tauri/target/aarch64-apple-darwin/release/bundle/

          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            tauri-args: ""
            bundle-path: src-tauri/target/release/bundle/

          # - name: linux-x64
          #   runner: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   tauri-args: ""
          #   bundle-path: src-tauri/target/release/bundle/

    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # - name: Install Linux deps
      #   if: runner.os == 'Linux'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       libwebkit2gtk-4.1-dev \
      #       libappindicator3-dev \
      #       librsvg2-dev \
      #       patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build ${{ matrix.tauri-args }}

      - name: Repackage DMG with install script (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find src-tauri/target -name "flowstate.app" -path "*/release/bundle/macos/*" | head -1)
          DMG_DIR=$(dirname "$APP_PATH" | sed 's|/macos$|/dmg|')
          OLD_DMG=$(find src-tauri/target -name "*.dmg" -path "*/release/bundle/dmg/*" | head -1)

          rm -f "$OLD_DMG"

          STAGING=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING/"
          cp scripts/install-macos.command "$STAGING/Install Flowstate.command"
          chmod +x "$STAGING/Install Flowstate.command"

          hdiutil create \
            -volname "Flowstate" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_DIR/Flowstate.dmg"

          rm -rf "$STAGING"

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: flowstate-${{ matrix.name }}-${{ github.ref_name }}
          path: ${{ matrix.bundle-path }}
          if-no-files-found: error
          retention-days: 30
