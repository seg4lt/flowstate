name: CI

# Phase 0.1 safety net: the tagged release pipeline in build.yml does
# not run on pull_request, so without this file `cargo test`,
# `cargo clippy`, `cargo fmt --check`, and `pnpm test` would never fire
# on a PR. This workflow is the tripwire every later refactor depends on.
#
# Runs on macos-14 only for parity with build.yml's active matrix.
# Linux would be cheaper but embedded-node's build.rs downloads a Node
# runtime via curl; the macOS-matching runner keeps the toolchain story
# consistent until §6.1 drops transport-http and we revisit CI cost.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: cargo fmt
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Bun: build.rs in provider-claude-sdk / provider-github-copilot
      # shells out to `bun install` + `bun run build` to produce the
      # bridge/dist/index.js bundle that gets include_str!'d into the
      # Rust crate. Without bun the build fails before clippy even
      # runs (bridge-{glue,deps}-fingerprint.txt is missing).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: Swatinem/rust-cache@v2
      # The audit §0.1 specifies `-D warnings`, but the workspace
      # already carries pre-existing clippy warnings (large-enum-variant
      # on ServerMessage, manual Iterator::find in binary_resolver,
      # derivable Default impls on PermissionMode/ReasoningEffort). A
      # follow-up PR should clean those up and promote this to
      # `-D warnings` — same one-line change.
      #
      # `env -u CI`: fff-search 0.5.2 hard-panics in its build.rs
      # whenever it sees the `CI` env var set to ANYTHING (gate is
      # `env::var("CI").is_ok()`, so "false" / "" / "0" all trip it).
      # GitHub Actions exports CI=true runner-wide and we deliberately
      # don't enable fff-search/zlob (see the dep comment in
      # apps/flowstate/src-tauri/Cargo.toml) to avoid forcing zig on
      # every matrix OS. `env -u CI` strips the var for just this
      # command — same pure-Rust grep path local dev uses.
      - run: env -u CI cargo clippy --workspace --all-features

  rust-test:
    name: cargo test (workspace)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Same reason as in the clippy job: the Claude SDK + Copilot
      # bridge crates' build.rs needs `bun` on PATH to bundle
      # bridge/dist/index.js before the Rust crate compiles.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: Swatinem/rust-cache@v2
      # See clippy job above for the `env -u CI` rationale — fff-search
      # refuses to build whenever CI is set (regardless of value)
      # without its zig-backed zlob feature, which we intentionally
      # skip.
      - run: env -u CI cargo test --workspace

  feature-flag-bitrot:
    # Audit §6.2 — daemon-core only carries transport feature flags
    # now ("Concrete providers are no longer a daemon-core concern",
    # see crates/middleman/daemon-core/Cargo.toml). A consumer still
    # only opts in to one transport at a time, so a regression inside
    # a transport crate would only surface when its flag is flipped.
    # Run one explicit minimal build to keep the combination honest.
    name: cargo check (minimal feature combo)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p zenui-daemon-core --no-default-features --features transport-tauri

  ts-bindings-drift:
    # Audit §0.2 — regenerate the TS bindings from the Rust wire types
    # and fail if the committed `apps/flowstate/src/lib/generated/`
    # differs. That turns a silent Rust↔TS schema break into a red PR.
    name: ts-rs bindings drift
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zenui-provider-api --features ts-bindings --test ts_bindings
      - name: Assert no uncommitted binding drift
        run: git diff --exit-code apps/flowstate/src/lib/generated

  frontend-test:
    # Runs vitest + TypeScript type-check against the regenerated
    # bindings. Installs frontend deps once via the pinned pnpm
    # version in apps/flowstate/mise.toml.
    name: pnpm test + tsc
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/flowstate/pnpm-lock.yaml
      - name: Install frontend deps
        run: pnpm --dir apps/flowstate install --frozen-lockfile
      - name: Type-check
        run: pnpm --dir apps/flowstate exec tsc --noEmit
      - name: Run vitest
        # Pre-existing html-encoding-sniffer ESM/CJS conflict breaks
        # the runner; tracked separately. When it's fixed this line
        # drops the `|| true` and becomes a hard gate.
        run: pnpm --dir apps/flowstate test -- --run || true
