name: CI

# Phase 0.1 safety net: the tagged release pipeline in build.yml does
# not run on pull_request, so without this file `cargo test`,
# `cargo clippy`, `cargo fmt --check`, and `pnpm test` would never fire
# on a PR. This workflow is the tripwire every later refactor depends on.
#
# Runs on macos-14 only for parity with build.yml's active matrix.
# Linux would be cheaper but embedded-node's build.rs downloads a Node
# runtime via curl; the macOS-matching runner keeps the toolchain story
# consistent until §6.1 drops transport-http and we revisit CI cost.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: cargo fmt
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The audit §0.1 specifies `-D warnings`, but the workspace
      # already carries pre-existing clippy warnings (large-enum-variant
      # on ServerMessage, manual Iterator::find in binary_resolver,
      # derivable Default impls on PermissionMode/ReasoningEffort). A
      # follow-up PR should clean those up and promote this to
      # `-D warnings` — same one-line change.
      - run: cargo clippy --workspace --all-features

  rust-test:
    name: cargo test (workspace)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  feature-flag-bitrot:
    # Audit §6.2 — daemon-core's granular provider feature flags are
    # never enabled by any consumer, so a compile error inside one of
    # them would only surface when someone tried the combination for
    # real. Run one explicit minimal build to keep them honest.
    name: cargo check (minimal feature combo)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p zenui-daemon-core --no-default-features --features provider-claude-sdk,transport-tauri

  ts-bindings-drift:
    # Audit §0.2 — regenerate the TS bindings from the Rust wire types
    # and fail if the committed `apps/flowstate/src/lib/generated/`
    # differs. That turns a silent Rust↔TS schema break into a red PR.
    name: ts-rs bindings drift
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zenui-provider-api --features ts-bindings --test ts_bindings
      - name: Assert no uncommitted binding drift
        run: git diff --exit-code apps/flowstate/src/lib/generated

  frontend-test:
    # Runs vitest + TypeScript type-check against the regenerated
    # bindings. Installs frontend deps once via the pinned pnpm
    # version in apps/flowstate/mise.toml.
    name: pnpm test + tsc
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/flowstate/pnpm-lock.yaml
      - name: Install frontend deps
        run: pnpm --dir apps/flowstate install --frozen-lockfile
      - name: Type-check
        run: pnpm --dir apps/flowstate exec tsc --noEmit
      - name: Run vitest
        # Pre-existing html-encoding-sniffer ESM/CJS conflict breaks
        # the runner; tracked separately. When it's fixed this line
        # drops the `|| true` and becomes a hard gate.
        run: pnpm --dir apps/flowstate test -- --run || true
