# Workspace-level cargo config. Discovered upward from any package's
# manifest dir, so settings here apply to every cargo invocation in
# the repo — including the GitHub Actions matrix's `pnpm tauri build`
# step (which descends into apps/flowstate/src-tauri) and the local
# `just build-windows` cross-build (which runs cargo from the repo
# root via cargo-xwin).

[target.x86_64-pc-windows-msvc]
# Statically link the Microsoft C/C++ runtime so the produced exe
# doesn't depend on `vcruntime140.dll` / `vcruntime140_1.dll` /
# `msvcp140.dll` being installed on the user's machine. Without
# this, a fresh Windows install (no VC++ Redistributable) hits
# "VCRUNTIME140_1.dll was not found" the moment they double-click
# flowstate.exe.
#
# Pairs with WEBVIEW2_STATIC=1 (set in build.yml + the justfile) —
# together they make flowstate.exe a fully self-contained binary
# with no sibling DLL or redist requirements beyond the WebView2
# Runtime itself (which ships with Windows 11 and recent Windows 10).
#
# `/defaultlib:libucrt.lib` — explicit Universal CRT static archive
# link. On a native Windows MSVC build, link.exe auto-imports
# libucrt.lib via the #pragma directives baked into libcmt.lib's
# metadata. lld-link (which cargo-xwin uses on macOS for cross-
# builds) doesn't honor those pragmas, so math symbols (log, pow,
# roundf, etc.) come up undefined the moment any pulled-in crate
# references them — sqlite, tao, tokio, image scaling code in
# Tauri's custom-protocol path, and so on. Adding the lib
# explicitly is harmless on native MSVC (link.exe deduplicates
# default-libs) and required on lld-link.
#
# Only applies to the windows-msvc target triple, so macOS / Linux
# builds and the host-target proc-macro compiles are unaffected.
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=/defaultlib:libucrt.lib",
]
