name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            runner: macos-14
            target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
            bundle-path: src-tauri/target/aarch64-apple-darwin/release/bundle/

          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            tauri-args: ""
            bundle-path: src-tauri/target/release/bundle/

          # - name: linux-x64
          #   runner: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   tauri-args: ""
          #   bundle-path: src-tauri/target/release/bundle/

    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.RS_AGENT_SDK_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # - name: Install Linux deps
      #   if: runner.os == 'Linux'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       libwebkit2gtk-4.1-dev \
      #       libappindicator3-dev \
      #       librsvg2-dev \
      #       patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Minisign key used by the Tauri updater. Built bundles are
          # signed with this; the matching pubkey is embedded in
          # src-tauri/tauri.conf.json (`plugins.updater.pubkey`) and
          # the desktop plugin verifies every manifest against it
          # before downloading. `createUpdaterArtifacts: true` in
          # tauri.conf.json makes this a hard build requirement —
          # if the secret is missing, `pnpm tauri build` fails here.
          # The key was generated with `tauri signer generate --ci`
          # (no password), so the PASSWORD env var can stay empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build ${{ matrix.tauri-args }}

      - name: Repackage DMG with install script (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find src-tauri/target -name "flowstate.app" -path "*/release/bundle/macos/*" | head -1)
          DMG_DIR=$(dirname "$APP_PATH" | sed 's|/macos$|/dmg|')
          OLD_DMG=$(find src-tauri/target -name "*.dmg" -path "*/release/bundle/dmg/*" | head -1)

          rm -f "$OLD_DMG"

          STAGING=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING/"
          cp scripts/install-macos.command "$STAGING/Install Flowstate.command"
          chmod +x "$STAGING/Install Flowstate.command"

          hdiutil create \
            -volname "Flowstate" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_DIR/Flowstate.dmg"

          rm -rf "$STAGING"

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release-assets
          TAG="${{ github.ref_name }}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            DMG=$(find src-tauri/target -name "Flowstate.dmg" -path "*/release/bundle/dmg/*" | head -1)
            cp "$DMG" "release-assets/Flowstate-${TAG}-macos-arm64.dmg"

            # Updater artifacts. createUpdaterArtifacts in tauri.conf.json
            # makes the bundler drop an .app.tar.gz (the delta the
            # updater swaps in on macOS) and a .app.tar.gz.sig
            # (minisign signature over it) next to the .app in
            # bundle/macos/. Both get uploaded; the release job reads
            # the .sig contents to populate latest.json.
            APP_TAR=$(find src-tauri/target -name "*.app.tar.gz" -path "*/release/bundle/macos/*" | head -1)
            APP_SIG=$(find src-tauri/target -name "*.app.tar.gz.sig" -path "*/release/bundle/macos/*" | head -1)
            cp "$APP_TAR" "release-assets/Flowstate-${TAG}-macos-arm64.app.tar.gz"
            cp "$APP_SIG" "release-assets/Flowstate-${TAG}-macos-arm64.app.tar.gz.sig"
          fi

          if [ "${{ runner.os }}" = "Windows" ]; then
            MSI=$(find src-tauri/target -name "*.msi" -path "*/release/bundle/msi/*" | head -1)
            EXE=$(find src-tauri/target -name "*-setup.exe" -path "*/release/bundle/nsis/*" | head -1)
            cp "$MSI" "release-assets/Flowstate-${TAG}-windows-x64.msi"
            cp "$EXE" "release-assets/Flowstate-${TAG}-windows-x64-setup.exe"

            # Updater artifacts. On Windows the NSIS setup.exe itself
            # is what the updater runs; tauri emits `<name>-setup.exe.sig`
            # and `<name>.msi.sig` alongside the installers in the
            # respective bundle dirs. We ship the NSIS sig because
            # `latest.json` below points at the NSIS URL — MSI is
            # kept as a standard-installer download only.
            EXE_SIG=$(find src-tauri/target -name "*-setup.exe.sig" -path "*/release/bundle/nsis/*" | head -1)
            cp "$EXE_SIG" "release-assets/Flowstate-${TAG}-windows-x64-setup.exe.sig"
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.name }}
          path: release-assets/
          if-no-files-found: error
          retention-days: 7

      # Full raw bundler output (the entire .../release/bundle/ dir,
      # including the unsigned .app, debug-symbols, MSI/NSIS
      # intermediates). Disabled because we already upload the
      # curated installers as `release-assets-*` above and they get
      # published to the public release, so this step only serves
      # post-mortem investigation. Re-enable if you hit a weird
      # shipped-build issue and want the raw bundle handy for 30
      # days. Tradeoff: ~500 MB/build of private-repo Actions
      # storage (~$0.10–0.40/month over the 500 MB free tier).
      # - name: Upload bundles (debug)
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: flowstate-${{ matrix.name }}-${{ github.ref_name }}
      #     path: ${{ matrix.bundle-path }}
      #     if-no-files-found: error
      #     retention-days: 30

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: ls -la release-assets/

      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="seg4lt/flowstate"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # The Tauri updater fetches latest.json from the release,
          # matches its current platform against the `platforms` map,
          # verifies the `signature` field against the embedded
          # pubkey, and then downloads `url`. URLs must be the final
          # GitHub release download URLs (which don't exist until
          # the release is published), but GitHub's /releases/download/
          # scheme is deterministic from tag + filename, so we can
          # precompute them here.
          MAC_SIG="$(cat "release-assets/Flowstate-${TAG}-macos-arm64.app.tar.gz.sig")"
          WIN_SIG="$(cat "release-assets/Flowstate-${TAG}-windows-x64-setup.exe.sig")"

          cat > release-assets/latest.json <<EOF
          {
            "version": "${TAG}",
            "notes": "See the release page for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Flowstate-${TAG}-macos-arm64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Flowstate-${TAG}-windows-x64-setup.exe"
              }
            }
          }
          EOF

          echo "--- latest.json ---"
          cat release-assets/latest.json

      - name: Create release on public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: seg4lt/flowstate
          tag_name: ${{ github.ref_name }}
          name: Flowstate ${{ github.ref_name }}
          body: |
            ## Flowstate ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Flowstate-${{ github.ref_name }}-macos-arm64.dmg` |
            | Windows (x64) MSI | `Flowstate-${{ github.ref_name }}-windows-x64.msi` |
            | Windows (x64) Setup | `Flowstate-${{ github.ref_name }}-windows-x64-setup.exe` |

            ### macOS Installation
            1. Download the `.dmg` file
            2. Open it and double-click "Install Flowstate.command"
            3. This installs to /Applications and clears the quarantine flag

            ### Windows Installation
            Download either the `.msi` (standard Windows Installer) or the `-setup.exe` (NSIS installer).

            ### Auto-updates
            Existing installs will see this version via the in-app
            updater (Settings → Updates, or the startup check). The
            `.app.tar.gz` / `-setup.exe.sig` / `latest.json` assets
            are consumed by the updater — you don't need to touch
            them manually.
          draft: false
          prerelease: false
          files: release-assets/*
          token: ${{ secrets.PUBLIC_REPO_PAT }}
